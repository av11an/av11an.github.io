<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Mono&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet"> 
    
<style type="text/css">



body {
background-image: url("images/creek.jpeg");
background-repeat: no-repeat;
background-size: cover;
background-attachment: fixed;
-o-background-size: cover;
-moz-background-size: cover;
-webkit-background-size: cover;
overflow-x: hidden;
overflow-y: hidden;
font-family: 'Bebas Neue', cursive;
margin: 0;
padding: 0;
}

p.textcontent {
    position: relative;
    text-align: center;
    color: white;
    font-size: 50px;
    margin: auto;
    font-family: 'Poppins', sans-serif;
}

section {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 10px;
  height: 100px;
  background-color:rgb(136, 255, 112);
  width: 100%;
}

.button {
  font-family: 'Bebas Neue', cursive;
  background-color: black;
  color: lawngreen;
  font-size: 40px;
  margin-left: 5%;
}

.header {
    padding: 3px;
    text-align: center;
    background: rgb(120, 245, 89);
    color: deepskyblue;
    font-size: 40px;
    font-family: 'Bebas Neue', cursive;
    width: 100%;
}


.custom-shape-divider-top-1636779432 {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    overflow: hidden;
    line-height: 0;
    transform: rotate(180deg);
}

.custom-shape-divider-top-1636779432 svg {
    position: relative;
    display: block;
    width: calc(134% + 1.3px);
    height: 60px;
}

.custom-shape-divider-top-1636779432 .shape-fill {
    fill: rgb(136, 255, 112);
}

.topnav {
    overflow: hidden;
    background-color: rgb(136, 255, 112);
}

.topnav a {
    float: left;
    display: block;
    color: black;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
    font-size: 40px;
}

.topnav a:hover {
    background-color: #ddd;
    color: black;
}

.topnav a.active {
    background-color: black;
    color: white;
}

.topnav .icon {
    display: none;
}

/* row column css */
/* Container for flexboxes */
.row { 
    position: relative;
    top: 100px;
    display: flex;
    flex-wrap: wrap;
}

/* Create four equal columns */
.column {
    position: relative;
 
    background-color: hsla(0, 0%, 0%, 0.7);
    flex: 20%;
    padding: 10px;
}

@media screen and (max-width: 600px) {
  .topnav a:not(:second-child) {display: none;}
  .topnav a.icon {
     float: right;
     display: block;
  }
}

@media screen and (max-width: 600px) {
  .topnav.responsive {position: relative;}
  .topnav.responsive .icon {
     position: absolute;
     right: 0;
     top: 0;
  }
  .topnav.responsive a {
    float: none;
    display: block;
    text-align: center;
  }
}

</style>
</head>
<body>



<section>
<div style="top:30px; position: absolute;" class="topnav" id="myTopnav">
    <a href="about.html">~ About</a>
    <a href="index.html" class="active">~ Av11an</a>
    <a href="https://github.com/av11an">~ REPO</a>
    </a>
</div>
</section>
<div style="position:relative;" class="custom-shape-divider-top-1636779432">

    <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M985.66,92.83C906.67,72,823.78,31,743.84,14.19c-82.26-17.34-168.06-16.33-250.45.39-57.84,11.73-114,31.07-172,41.86A600.21,600.21,0,0,1,0,27.35V120H1200V95.8C1132.19,118.92,1055.71,111.31,985.66,92.83Z" class="shape-fill"></path>
    </svg>
</div>

<div class="row"> 
    <div class="column">
         <p class="textcontent">My name is Evan Ellis and I am a beginner programer!</p> 
         <p class="textcontent">I reside in Washington and I hope to study Computer Science.</p>
         <p class="textcontent">Check out my github repo located at the top to see my current and past projects.</p>
    </div>
</div>


<script>
    function myFunction() {
      var x = document.getElementById("myTopnav");
      if (x.className === "topnav") {
        x.className += " responsive";
      } else {
        x.className = "topnav";
      }
    }
</script>

</body>
</html>
